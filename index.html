<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accelerate Clicks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

html{
    scroll-behavior:smooth;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
    url('images/Kashmir/hero.jpg');
    background-size:cover;
    background-position:center;
}

.hero-content{
    max-width:900px;
}

.hero h1{
    font-size:4rem;
    margin-bottom:10px;
}

.hero p{
    color:#d4d4d4;
    margin-bottom:20px;
}

.socials{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.socials a{
    text-decoration:none;
    color:white;
    padding:12px 22px;
    border-radius:50px;
    background:rgba(255,255,255,.1);
    transition:.3s;
}

.socials a:hover{
    background:white;
    color:black;
}

.section{
    padding:80px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.section-title{
    text-align:center;
    font-size:2.2rem;
    margin-bottom:40px;
}

.destination-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:#141414;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
    border:1px solid #222;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h3{
    margin-bottom:10px;
}

.card-content p{
    color:#bdbdbd;
}

.viewer{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    overflow-y:auto;
    z-index:9999;
    padding:30px;
}

.viewer-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.close-btn{
    background:#fff;
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:30px;
    cursor:pointer;
}

.viewer-gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.viewer-gallery img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
}

.video-section{
    margin-top:40px;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.video-grid video{
    width:100%;
    border-radius:15px;
}

footer{
    text-align:center;
    padding:40px;
    border-top:1px solid #222;
    color:#999;
}

@media(max-width:768px){

.hero h1{
    font-size:2.6rem;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>Accelerate Clicks</h1>

<p>
Travel • Photography • Adventure
</p>

<div class="socials">

<a href="https://www.instagram.com/accelerate.clicks" target="_blank">
Instagram
</a>

<a href="https://www.youtube.com/@accelerate.clicks" target="_blank">
YouTube
</a>

<a href="https://www.facebook.com/accelerate.clicks" target="_blank">
Facebook
</a>

<a href="https://snapchat.com/add/akashkr_xda" target="_blank">
Snapchat
</a>

</div>

</div>

</section>

<section class="section">

<div class="container">

<h2 class="section-title">
Destinations
</h2>

<div id="destinationGrid" class="destination-grid">
</div>

</div>

</section>

<div class="viewer" id="viewer">

<div class="viewer-header">

<h2 id="viewerTitle"></h2>

<button class="close-btn" onclick="closeViewer()">
Close
</button>

</div>

<p id="viewerDescription"></p>

<br><br>

<div class="viewer-gallery" id="viewerGallery"></div>

<div class="video-section">

<h2 style="margin-top:40px;">
Videos
</h2>

<br>

<div class="video-grid" id="videoGrid"></div>

</div>

</div>

<footer>

© Accelerate Clicks

</footer>

<script src="data.js"></script>

<script>

const grid = document.getElementById("destinationGrid");

destinations.forEach((destination,index)=>{

const card = document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${destination.hero}" alt="${destination.name}">

<div class="card-content">

<h3>${destination.name}</h3>

<p>${destination.description}</p>

</div>

`;

card.onclick=()=>openDestination(index);

grid.appendChild(card);

});

function openDestination(index){

const destination = destinations[index];

document.getElementById("viewer").style.display="block";

document.getElementById("viewerTitle").innerText=
destination.name;

document.getElementById("viewerDescription").innerText=
destination.description;

const gallery =
document.getElementById("viewerGallery");

gallery.innerHTML="";

destination.images.forEach(img=>{

gallery.innerHTML +=
`<img src="${img}">`;

});

const videoGrid =
document.getElementById("videoGrid");

videoGrid.innerHTML="";

destination.videos.forEach(video=>{

videoGrid.innerHTML +=
`
<video controls>
<source src="${video}" type="video/mp4">
</video>
`;

});

window.scrollTo(0,0);

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}

</script>

</body>
</html>
