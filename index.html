<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accelerate Clicks</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<script>
window.addEventListener('scroll',()=>{

    const cards =
    document.querySelectorAll('.card');

    cards.forEach(card=>{

        const rect =
        card.getBoundingClientRect();

        if(rect.top < window.innerHeight-100){

            card.style.opacity='1';
            card.style.transform='translateY(0)';
        }

    });

});
</script>

<body>

<header class="hero">

<div class="hero-overlay">

<img id="profileImage" class="profile-image">

<h1 id="brand"></h1>

<h2 id="name"></h2>

<p id="tagline"></p>
<p class="travel-quote">
"Collecting moments, not things."
</p>

<div class="socials" id="socials"></div>

<a href="#destinations" class="explore-btn">
Explore My Journey
</a>

</div>

</header>

<section class="stats">

<div class="stat-card">
<h2 id="destinationCount">0</h2>
<p>Destinations</p>
</div>

<div class="stat-card">
<h2 id="photoCount">0</h2>
<p>Photos</p>
</div>

<div class="stat-card">
<h2 id="videoCount">0</h2>
<p>Videos</p>
</div>

<div class="stat-card">
<h2>∞</h2>
<p>Memories</p>
</div>

</section>

<section id="destinations">

<h2 class="section-title">
Explore Destinations
</h2>

<div id="destinationGrid" class="destination-grid"></div>

</section>

<section class="bucket">

<h2 class="section-title">
Upcoming Adventures
</h2>

<ul id="bucketList"></ul>

</section>

<footer>

<p>© Accelerate Clicks</p>

</footer>

<div id="destinationModal" class="modal">

<span class="close" onclick="closeModal()">
&times;
</span>

<div id="modalContent"></div>

</div>

<div id="lightbox" class="lightbox">

<img id="lightboxImg">

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
