<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Accelerate Clicks</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HERO SECTION -->

    <header class="hero">

        <div class="hero-overlay">

            <img id="profileImage" class="profile-image" alt="Profile">

            <h1 id="brand"></h1>

            <h2 id="name"></h2>

            <p id="tagline"></p>

            <div id="socials" class="socials"></div>

            <a href="#journeyContainer" class="explore-btn">
                Explore My Journey
            </a>

        </div>

    </header>

    <!-- STATS -->

    <section class="stats">

        <div class="stat-card">

            <h2 id="yearCount">0</h2>

            <p>Years</p>

        </div>

        <div class="stat-card">

            <h2 id="destinationCount">0</h2>

            <p>Destinations</p>

        </div>

        <div class="stat-card">

            <h2 id="photoCount">0</h2>

            <p>Photos</p>

        </div>

        <div class="stat-card">

            <h2 id="videoCount">0</h2>

            <p>Reels</p>

        </div>

    </section>

    <!-- TIMELINE -->

    <section id="journeyContainer">

        <h2 class="section-title">
            Travel Timeline
        </h2>

        <!-- Generated dynamically from data.js -->

    </section>

    <!-- BUCKET LIST -->

    <section class="bucket">

        <h2 class="section-title">
            Upcoming Adventures
        </h2>

        <ul id="bucketList"></ul>

    </section>

    <!-- FOOTER -->

    <footer>

        <p>
            © Accelerate Clicks | Travel • Photography • Stories
        </p>

    </footer>

    <!-- DESTINATION MODAL -->

    <div id="destinationModal" class="modal">

        <span class="close" onclick="closeModal()">
            &times;
        </span>

        <div id="modalContent"></div>

    </div>

    <!-- IMAGE LIGHTBOX -->

    <div id="lightbox" class="lightbox">

        <img id="lightboxImg" alt="Travel Photo">

    </div>

    <!-- DATA -->

    <script src="data.js"></script>

    <!-- LOGIC -->

    <script src="script.js"></script>

</body>

</html>
