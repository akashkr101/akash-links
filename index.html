<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b');
    background-size:cover;
    background-position:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:24px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.5);
    object-fit:cover;
}

h1{
    margin-top:15px;
    font-size:28px;
}

.tagline{
    margin-top:8px;
    opacity:0.9;
    font-size:14px;
}

.location{
    margin-top:8px;
    font-size:13px;
    opacity:.8;
}

.links{
    margin-top:25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:14px;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.2);
    transition:.3s;
    font-weight:600;
}

.btn:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.25);
}

.section-title{
    margin-top:25px;
    margin-bottom:10px;
    font-size:14px;
    letter-spacing:1px;
    opacity:.8;
}

.footer{
    margin-top:25px;
    font-size:12px;
    opacity:.7;
}
</style>
</head>

<body>

<div class="card">

    <img class="profile"
         src="YOUR_PROFILE_PHOTO_URL"
         alt="Akash Kumar">

    <h1>Akash Kumar</h1>

    <div class="tagline">
        📸 Travel Creator • 🏔 Mountain Lover • ⚙️ DevOps Engineer
    </div>

    <div class="location">
        Exploring India One Journey at a Time
    </div>

    <div class="section-title">TRAVEL CONTENT</div>

    <div class="links">

        <a class="btn" href="YOUR_YOUTUBE_LINK">
            🎥 YouTube Channel
        </a>

        <a class="btn" href="YOUR_INSTAGRAM_LINK">
            📷 Instagram
        </a>

        <a class="btn" href="YOUR_SNAPCHAT_LINK">
            👻 Snapchat
        </a>

        <a class="btn" href="YOUR_LATEST_VIDEO_LINK">
            🚀 Latest Adventure
        </a>

    </div>

    <div class="section-title">PROFESSIONAL</div>

    <div class="links">

        <a class="btn" href="YOUR_UPWORK_LINK">
            💼 Upwork Profile
        </a>

        <a class="btn" href="YOUR_PORTFOLIO_LINK">
            🌐 Portfolio Website
        </a>

        <a class="btn" href="YOUR_GITHUB_LINK">
            ⚡ GitHub
        </a>

    </div>

    <div class="footer">
        Made with ❤️ by Akash Kumar
    </div>

</div>

</body>
</html>
