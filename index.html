<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accelerate Clicks | Travel & Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#080808;
color:white;
overflow-x:hidden;
}

a{
text-decoration:none;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url("images/Kashmir/hero.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content{
max-width:900px;
}

.hero h1{
font-size:4rem;
margin-bottom:15px;
}

.hero p{
font-size:1.2rem;
color:#ddd;
}

.socials{
margin-top:30px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.socials a{
padding:12px 24px;
border-radius:50px;
background:#ffffff10;
backdrop-filter:blur(10px);
color:white;
transition:.3s;
border:1px solid #ffffff20;
}

.socials a:hover{
transform:translateY(-3px);
background:#ffffff20;
}

.section{
padding:80px 8%;
}

.section-title{
font-size:2.5rem;
margin-bottom:40px;
text-align:center;
}

.destinations{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
position:relative;
height:400px;
border-radius:25px;
overflow:hidden;
cursor:pointer;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.9),
rgba(0,0,0,.1));
display:flex;
align-items:flex-end;
padding:30px;
}

.card-overlay h3{
font-size:2rem;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.stat-box{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
}

.stat-box h2{
font-size:2.5rem;
}

.stat-box p{
color:#aaa;
}

footer{
padding:40px;
text-align:center;
color:#888;
}

.modal{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999;
overflow-y:auto;
}

.modal-content{
padding:40px;
max-width:1400px;
margin:auto;
}

.close-btn{
position:fixed;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
z-index:1000;
}

.destination-hero{
height:70vh;
border-radius:25px;
overflow:hidden;
position:relative;
margin-bottom:40px;
}

.destination-hero img{
width:100%;
height:100%;
object-fit:cover;
}

.destination-title{
position:absolute;
bottom:40px;
left:40px;
}

.destination-title h1{
font-size:4rem;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.video-grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

video{
width:100%;
border-radius:20px;
}

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.lightbox img{
max-width:95%;
max-height:95%;
}

@media(max-width:768px){

.hero h1{
font-size:2.7rem;
}

.destination-title h1{
font-size:2rem;
}

}

</style>
</head>

<body>

<section class="hero">
<div class="hero-content">

<h1>Accelerate Clicks</h1>

<p>
Travel • Photography • Stories
<br><br>
Collecting moments, not things.
</p>

<div class="socials">

<a href="https://www.instagram.com/accelerate.clicks" target="_blank">
Instagram
</a>

<a href="https://www.youtube.com/@accelerate.clicks" target="_blank">
YouTube
</a>

<a href="https://www.facebook.com/accelerate.clicks" target="_blank">
Facebook
</a>

<a href="https://snapchat.com/akashkr_xda" target="_blank">
Snapchat
</a>

</div>

</div>
</section>

<section class="section">

<h2 class="section-title">Explore My Journey</h2>

<div id="destinationGrid" class="destinations"></div>

</section>

<section class="section">

<h2 class="section-title">Travel Stats</h2>

<div class="stats">

<div class="stat-box">
<h2>3+</h2>
<p>Destinations</p>
</div>

<div class="stat-box">
<h2>100+</h2>
<p>Photos Captured</p>
</div>

<div class="stat-box">
<h2>50+</h2>
<p>Videos Created</p>
</div>

<div class="stat-box">
<h2>∞</h2>
<p>Memories</p>
</div>

</div>

</section>

<footer>

© 2026 Accelerate Clicks

</footer>

<div class="modal" id="destinationModal">

<div class="close-btn" onclick="closeDestination()">
✕
</div>

<div id="modalContent" class="modal-content">
</div>

</div>

<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

<script src="data.js"></script>

<script>

const grid=document.getElementById('destinationGrid');

destinations.forEach((place,index)=>{

grid.innerHTML+=`
<div class="card" onclick="openDestination(${index})">

<img src="${place.hero}">

<div class="card-overlay">
<h3>${place.name}</h3>
</div>

</div>
`;

});

function openDestination(index){

const place=destinations[index];

let images='';

place.images.forEach(img=>{

images+=`
<img src="${img}" onclick="openImage('${img}')">
`;

});

let videos='';

place.videos.forEach(video=>{

videos+=`
<video controls>
<source src="${video}">
</video>
`;

});

document.getElementById('modalContent').innerHTML=`

<div class="destination-hero">

<img src="${place.hero}">

<div class="destination-title">
<h1>${place.name}</h1>
<p>${place.description}</p>
</div>

</div>

<h2 style="margin-bottom:20px">Gallery</h2>

<div class="gallery">
${images}
</div>

${
place.videos.length
?
`
<h2 style="margin-top:50px;margin-bottom:20px">
Travel Reels
</h2>

<div class="video-grid">
${videos}
</div>
`
:
''
}

`;

document.getElementById('destinationModal').style.display='block';

window.scrollTo(0,0);

}

function closeDestination(){

document.getElementById('destinationModal').style.display='none';

}

function openImage(src){

document.getElementById('lightbox').style.display='flex';

document.getElementById('lightboxImg').src=src;

}

document.getElementById('lightbox').onclick=()=>{

document.getElementById('lightbox').style.display='none';

};

</script>

</body>
</html>
