<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Accelerate Clicks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>Accelerate Clicks</h1>

<p>
Travel • Photography • Stories
<br><br>
Collecting moments, not things.
</p>

<div class="socials">

<a href="https://www.instagram.com/accelerate.clicks" target="_blank">Instagram</a>

<a href="https://www.youtube.com/@accelerate.clicks" target="_blank">YouTube</a>

<a href="https://www.facebook.com/accelerate.clicks" target="_blank">Facebook</a>

<a href="https://snapchat.com/akashkr_xda" target="_blank">Snapchat</a>

</div>

</div>

</section>

<section class="section">

<h2 class="section-title">Explore My Journey</h2>

<div id="destinationGrid" class="destinations"></div>

</section>

<footer>

© Accelerate Clicks

</footer>

<div class="modal" id="modal">

<div class="close" onclick="closeDestination()">
✕
</div>

<div id="modalContent" class="modal-content"></div>

</div>

<div class="lightbox" id="lightbox">

<img id="lightboxImg">

</div>

<script src="data.js"></script>

<script>

const grid=document.getElementById('destinationGrid');

destinations.forEach((place,index)=>{

grid.innerHTML+=`

<div class="card" onclick="openDestination(${index})">

<img src="${place.hero}">

<div class="overlay">

<h3>${place.name}</h3>

</div>

</div>

`;

});

function openDestination(index){

const place=destinations[index];

let images='';

place.images.forEach(img=>{

images+=`
<img src="${img}" onclick="openImage('${img}')">
`;

});

let videos='';

place.videos.forEach(video=>{

videos+=`

<video controls>

<source src="${video}">

</video>

`;

});

document.getElementById('modalContent').innerHTML=`

<div class="destination-hero">

<img src="${place.hero}">

<div class="destination-info">

<h1>${place.name}</h1>

<p>${place.description}</p>

</div>

</div>

<h2>Gallery</h2>

<br>

<div class="gallery">

${images}

</div>

${
place.videos.length
?
`

<h2 style="margin-top:50px;">
Travel Reels
</h2>

<br>

<div class="video-grid">

${videos}

</div>

`
:
''
}

`;

document.getElementById('modal').style.display='block';

}

function closeDestination(){

document.getElementById('modal').style.display='none';

}

function openImage(src){

document.getElementById('lightbox').style.display='flex';

document.getElementById('lightboxImg').src=src;

}

document.getElementById('lightbox').onclick=()=>{

document.getElementById('lightbox').style.display='none';

};

</script>

</body>
</html>
